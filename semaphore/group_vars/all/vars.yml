---
# Semaphore Deployment Configuration
# Only settings you need to review are in this file.
# Advanced options can be overridden — see roles/*/defaults/main.yml

# =============================================================================
# VERSIONS
# =============================================================================
semaphore_version: "v2.16.37"
postgres_version: "15"

# =============================================================================
# SYSTEM
# =============================================================================
freebsd_version: "13.5-RELEASE"  # Match your host: freebsd-version
freebsd_arch: "amd64"
zfs_pool: "zroot"                # Find yours: zpool list
jail_dataset: "jails"

# =============================================================================
# NETWORK
# =============================================================================

# Network mode: "alias" | "nat" | "vnet" | "inherit"
jail_network_mode: "alias"

# Host network interface (find yours: ifconfig)
jail_interface: "em0"

# Jail IP addresses (pick two free IPs on your subnet)
jail_ip_database: "192.168.1.50"
jail_ip_semaphore: "192.168.1.51"

# Subnet and gateway
jail_network_cidr: "192.168.1.0/24"
jail_gateway: "192.168.1.1"

# Semaphore port
semaphore_port: 3000

# =============================================================================
# TLS (optional — defaults generate a self-signed certificate)
# =============================================================================
# To use your own certificates, uncomment and set:
# tls_cert_strategy: "existing"
# tls_existing_cert_path: "/path/to/your/certificate.crt"
# tls_existing_key_path: "/path/to/your/private.key"
# tls_existing_ca_path: "/path/to/your/ca-bundle.crt"

# =============================================================================
# DERIVED SETTINGS (usually no need to change)
# =============================================================================

# PF firewall rules (derived from IPs and port above)
pf_jail_ips:
  - "{{ jail_ip_database }}"
  - "{{ jail_ip_semaphore }}"

pf_port_forwards:
  - { port: "{{ semaphore_port }}", jail_ip: "{{ jail_ip_semaphore }}" }

pf_inbound_rules:
  - { jail_ip: "{{ jail_ip_semaphore }}", port: "{{ semaphore_port }}", proto: "tcp" }

pf_inter_jail_rules:
  - { from_ip: "{{ jail_ip_semaphore }}", to_ip: "{{ jail_ip_database }}", port: 5432, proto: "tcp" }

# TLS certificate details (used when generating self-signed certs)
tls_cert_common_name: "{{ jail_ip_semaphore }}"
tls_cert_san:
  - "IP:{{ jail_ip_semaphore }}"
