---
# Prepare BSD host for jail deployment
- name: Prepare BSD Host for Jails
  hosts: jail_hosts
  become: true
  gather_facts: true
  vars_files:
    - ../group_vars/all/secrets.yml
    - ../group_vars/all/vars.yml

  tasks:
    - name: Ensure ZFS is available
      command: zfs list
      register: zfs_check
      changed_when: false
      failed_when: zfs_check.rc != 0

    - name: Debug - Show zfs_pool variable
      debug:
        msg: "ZFS Pool: {{ zfs_pool }}, Jail Dataset: {{ jail_dataset }}"

    - name: Create ZFS datasets for jails
      community.general.zfs:
        name: "{{ item }}"
        state: present
        extra_zfs_properties:
          mountpoint: "/{{ item }}"
          compression: lz4
      loop:
        - "{{ zfs_pool }}/{{ jail_dataset }}"
        - "{{ zfs_pool }}/{{ jail_dataset }}/base"
        - "{{ zfs_pool }}/{{ jail_dataset }}/data"
        - "{{ zfs_pool }}/{{ jail_dataset }}/data/db"
        - "{{ zfs_pool }}/{{ jail_dataset }}/data/semaphore"

    - name: Create jail directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /usr/local/etc/jail.conf.d
        - /var/log/jails

    - name: Download FreeBSD base for jails
      command: >
        fetch -o /tmp/base.txz
        https://download.freebsd.org/ftp/releases/{{ freebsd_arch }}/{{ freebsd_version }}/base.txz
      args:
        creates: /tmp/base.txz

    - name: Extract base system to ZFS dataset
      command: >
        tar -xf /tmp/base.txz -C /{{ zfs_pool }}/{{ jail_dataset }}/base
      args:
        creates: "/{{ zfs_pool }}/{{ jail_dataset }}/base/bin"

    - name: Update base system
      command: >
        freebsd-update -b /{{ zfs_pool }}/{{ jail_dataset }}/base
        --not-running-from-cron fetch install
      register: update_result
      changed_when: "'No updates' not in update_result.stdout"
      failed_when: false

    - name: Create rc.conf.d directory
      file:
        path: /etc/rc.conf.d
        state: directory
        mode: '0755'

    - name: Enable jail service
      command: sysrc -f /etc/rc.conf.d/jail jail_enable="YES"

    - name: Initialize jail_list if not set
      shell: sysrc -f /etc/rc.conf.d/jail -n jail_list >/dev/null 2>&1 || sysrc -f /etc/rc.conf.d/jail jail_list=""
      changed_when: false

    - name: Configure jail.conf
      template:
        src: ../../shared/roles/jail-base/templates/jail.conf.j2
        dest: /etc/jail.conf
        mode: '0644'

    # NAT mode: create loopback interface and enable IP forwarding
    - name: Create cloned loopback interface for jail NAT
      command: sysrc cloned_interfaces+="{{ jail_nat_interface }}"
      when: jail_network_mode | default('alias') == 'nat'

    - name: Configure jail IPs on loopback interface
      command: >
        sysrc ifconfig_{{ jail_nat_interface }}_alias{{ idx }}="inet {{ item }} netmask 255.255.255.255"
      loop:
        - "{{ jail_ip_database }}"
        - "{{ jail_ip_semaphore }}"
      loop_control:
        index_var: idx
      when: jail_network_mode | default('alias') == 'nat'

    - name: Bring up loopback interface
      shell: |
        ifconfig {{ jail_nat_interface }} create 2>/dev/null || true
        ifconfig {{ jail_nat_interface }} inet {{ jail_ip_database }} netmask 255.255.255.255 alias
        ifconfig {{ jail_nat_interface }} inet {{ jail_ip_semaphore }} netmask 255.255.255.255 alias
      when: jail_network_mode | default('alias') == 'nat'
      changed_when: false

    - name: Enable IP forwarding for NAT
      command: sysrc gateway_enable="YES"
      when: jail_network_mode | default('alias') == 'nat'

    - name: Activate IP forwarding immediately
      command: sysctl net.inet.ip.forwarding=1
      when: jail_network_mode | default('alias') == 'nat'
      changed_when: false

    # VNET mode: create bridge interface for jail networking
    - name: Create bridge interface for VNET jails
      command: sysrc cloned_interfaces+="{{ jail_bridge_interface | default('bridge0') }}"
      when: jail_network_mode | default('alias') == 'vnet'

    - name: Bring up bridge interface
      shell: |
        ifconfig {{ jail_bridge_interface | default('bridge0') }} create 2>/dev/null || true
        ifconfig {{ jail_bridge_interface | default('bridge0') }} inet {{ jail_gateway }}/{{ jail_network_cidr.split('/')[1] }} up
      when: jail_network_mode | default('alias') == 'vnet'
      changed_when: false

    - name: Enable IP forwarding for VNET
      command: sysrc gateway_enable="YES"
      when: jail_network_mode | default('alias') == 'vnet'

    - name: Activate IP forwarding immediately for VNET
      command: sysctl net.inet.ip.forwarding=1
      when: jail_network_mode | default('alias') == 'vnet'
      changed_when: false

    - name: Create pf.conf from template
      template:
        src: ../../shared/roles/jail-base/templates/pf.conf.j2
        dest: /etc/pf.conf
        mode: '0644'
      notify: reload pf
      when: jail_network_mode | default('alias') != 'inherit'

    - name: Enable pf in rc.conf.d
      command: sysrc -f /etc/rc.conf.d/jail pf_enable="YES"
      when: jail_network_mode | default('alias') != 'inherit'

    - name: Load pf kernel module if needed
      command: kldload pf
      register: kldload_pf
      failed_when: false
      changed_when: kldload_pf.rc == 0
      when: jail_network_mode | default('alias') != 'inherit'

    - name: Start pf if not running
      shell: pfctl -e 2>/dev/null || true
      changed_when: false
      when: jail_network_mode | default('alias') != 'inherit'

  handlers:
    - name: reload pf
      command: pfctl -f /etc/pf.conf
