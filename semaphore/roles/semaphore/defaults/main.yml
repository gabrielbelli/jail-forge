---
# Default variables for semaphore role
semaphore_version: "v2.16.37"
semaphore_arch: "freebsd_amd64"
semaphore_install_dir: /usr/local/bin
semaphore_config_dir: /usr/local/etc/semaphore
semaphore_tmp_dir: /var/tmp/semaphore
semaphore_port: 3000
semaphore_cookie_hash: "changeme_random_hash"
semaphore_cookie_encryption: "changeme_random_encryption_key"
semaphore_access_key_encryption: "changeme_access_key_encryption"

# Database configuration
semaphore_db_dialect: postgres
semaphore_db_host: "{{ hostvars['semaphore-db'].jail_ip }}"
semaphore_db_port: 5432
semaphore_db_name: semaphore
semaphore_db_user: semaphore
semaphore_db_password: changeme

# Admin user
semaphore_admin_user: admin
semaphore_admin_email: admin@example.com
semaphore_admin_name: "Admin User"
semaphore_admin_password: changeme

# Service configuration
semaphore_service_user: semaphore
semaphore_service_group: semaphore

# TLS/SSL defaults
tls_enabled: true
tls_cert_strategy: "generate"
tls_cert_lifetime_days: 3650
tls_cert_key_size: 4096
tls_cert_country: "US"
tls_cert_state: "State"
tls_cert_locality: "City"
tls_cert_organization: "Organisation"
tls_cert_organizational_unit: "IT"
tls_cert_common_name: "localhost"
tls_cert_email: "admin@example.com"
tls_cert_san: []
tls_cert_dir: "/usr/local/etc/ssl"
tls_cert_file: "{{ tls_cert_dir }}/semaphore.crt"
tls_key_file: "{{ tls_cert_dir }}/semaphore.key"
tls_ca_file: "{{ tls_cert_dir }}/ca-bundle.crt"
tls_existing_cert_path: ""
tls_existing_key_path: ""
tls_existing_ca_path: ""

# Custom CA certificates
custom_ca_enabled: false
custom_ca_certificates: []
custom_ca_dir: "/usr/local/share/certs"

# Backup defaults
backup_location: "/var/backups/semaphore"
backup_retention_count: 10
backup_compress: false

# Additional packages
semaphore_required_packages:
  - git
  - py311-ansible-core
  - ca_root_nss
  - curl
  - bash
  - gtar
