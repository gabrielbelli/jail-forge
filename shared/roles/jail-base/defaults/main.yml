---
# Default variables for jail-base role
jail_name: "myjail"
jail_ip: "192.168.1.100"
jail_interface: "em0"
jail_autostart: true
jail_vnet: false

# Network mode: "alias", "nat", "vnet", or "inherit"
#   alias   - Jail IPs are aliases on the host interface
#   nat     - Jails use a private loopback, pf handles NAT and port forwarding
#   vnet    - Jails with isolated network stack (bridge + epair interfaces)
#   inherit - Jails share parent's network stack (for nested jail deployments)
jail_network_mode: "alias"
jail_nat_interface: "lo1"
jail_devfs_ruleset: 4

# VNET-specific settings (only used when jail_vnet: true)
jail_bridge_interface: "bridge0"
jail_id: 0  # Numeric ID for unique epair interfaces; override per-jail in inventory
jail_vnet_static_ip: ""
jail_vnet_gateway: ""

# ZFS settings
jail_zfs_enabled: true
jail_zfs_dataset: "{{ zfs_pool }}/{{ jail_dataset }}/data/{{ jail_name }}"

# Base system
jail_base_path: "/{{ zfs_pool }}/{{ jail_dataset }}/base"
jail_path: "/{{ zfs_pool }}/{{ jail_dataset }}/data/{{ jail_name }}"

# Jail parameters
jail_hostname: "{{ jail_name }}.local"
jail_allow_raw_sockets: false
jail_allow_mount: true
jail_allow_mount_devfs: true
jail_allow_mount_nullfs: true
jail_allow_mount_zfs: false
jail_exec_clean: true

# Service configuration
jail_syslog_enabled: true
jail_sendmail_enabled: false

# Nullfs mounts (optional): Mount host directories into jail
# Format: { src: "/host/path", dest: "/jail/path", options: "ro" }
jail_mounts: []

# PF firewall configuration (override per-app in group_vars/all/vars.yml)
# List of all jail IPs (used for NAT source, outbound rules)
pf_jail_ips: []
# Port forwards: host port -> jail IP:port (NAT mode only)
# Format: { port: 3000, jail_ip: "192.168.1.51" }
pf_port_forwards: []
# Inbound rules: allow external traffic to specific jail:port (alias mode)
# Format: { jail_ip: "192.168.1.51", port: 3000, proto: "tcp" }
pf_inbound_rules: []
# Inter-jail rules: allow jail-to-jail traffic on specific ports (alias mode)
# Format: { from_ip: "192.168.1.51", to_ip: "192.168.1.50", port: 5432, proto: "tcp" }
pf_inter_jail_rules: []
