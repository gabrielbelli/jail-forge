name: Test Full Lifecycle

on:
  workflow_dispatch:
    inputs:
      skip_destroy:
        description: 'Skip final cleanup (leave deployment running)'
        required: false
        type: boolean
        default: false
      test_nat_mode:
        description: 'Also test NAT networking mode after alias mode'
        required: false
        type: boolean
        default: true
      update_version:
        description: 'Semaphore version for update test (empty = redeploy same version)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  test:
    name: Full Lifecycle Test
    runs-on: self-hosted
    timeout-minutes: 120
    environment: bsd-production

    env:
      # =========================================================================
      # Application Configuration
      # Define all applications to test in this JSON structure
      # =========================================================================
      APPS_JSON: |
        [
          {
            "name": "semaphore",
            "working_dir": "semaphore",
            "jail_name": "semaphore-app",
            "db_jail_name": "semaphore-db",
            "port": 3000,
            "health_endpoint": "/api/ping",
            "service_name": "semaphore",
            "backup_location": "/var/backups/semaphore"
          }
        ]

    steps:
      # =========================================================================
      # PHASE 1: Environment Setup
      # =========================================================================
      - name: "Phase 1: Checkout repository"
        run: |
          if [ -d ".git" ]; then
            git fetch origin "${{ github.ref }}" --depth=1
            git checkout FETCH_HEAD
          else
            git clone --depth=1 --branch "${GITHUB_REF_NAME}" \
              "https://github.com/${{ github.repository }}.git" .
          fi

      - name: "Phase 1: Verify system dependencies"
        run: |
          echo "Checking required system tools..."
          for cmd in make jq python3 ssh git; do
            command -v "$cmd" >/dev/null 2>&1 || { echo "Missing: $cmd — update runner-install.sh"; exit 1; }
            echo "  found: $cmd"
          done

      - name: "Phase 1: Install Ansible and dependencies"
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            if [ -f "$app_dir/requirements.txt" ]; then
              echo "Installing requirements for $app_dir..."
              pip install -r "$app_dir/requirements.txt"
            fi
          done
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: "Phase 1: Set up SSH key"
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/belli
          chmod 600 ~/.ssh/belli
          ssh-keyscan -H ${{ secrets.BSD_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: "Phase 1: Create inventory/hosts.yml"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "Creating inventory for $app_dir..."
            mkdir -p "$app_dir/inventory"
            cat > "$app_dir/inventory/hosts.yml" <<'EOF'
          ---
          all:
            children:
              jail_hosts:
                hosts:
                  bsd-host:
                    ansible_host: ${{ secrets.BSD_HOST }}
                    ansible_user: ${{ secrets.SSH_USER }}
                    ansible_python_interpreter: /usr/local/bin/python3.11
                    ansible_ssh_private_key_file: ~/.ssh/belli

              jails:
                children:
                  database_jails:
                    hosts:
                      semaphore-db:
                        jail_ip: ${{ secrets.JAIL_IP_DATABASE }}
                        jail_host: bsd-host
                        jail_autostart: true
                        jail_vnet: false

                  app_jails:
                    hosts:
                      semaphore-app:
                        jail_ip: ${{ secrets.JAIL_IP_SEMAPHORE }}
                        jail_host: bsd-host
                        jail_autostart: true
                        jail_vnet: false
                        jail_mounts:
                          - { src: "/var/log/semaphore-jails/semaphore-app", dest: "/var/log/semaphore", options: "rw" }

              all_jails:
                children:
                  database_jails:
                  app_jails:
          EOF
            chmod 644 "$app_dir/inventory/hosts.yml"
          done

      - name: "Phase 1: Create secrets.yml"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "Creating secrets.yml for $app_dir..."
            sed -e "s|{{DB_PASSWORD}}|${{ secrets.DB_PASSWORD }}|g" \
                -e "s|{{SEMAPHORE_ADMIN_PASSWORD}}|${{ secrets.SEMAPHORE_ADMIN_PASSWORD }}|g" \
                -e "s|{{SEMAPHORE_ACCESS_KEY_ENCRYPTION}}|${{ secrets.SEMAPHORE_ACCESS_KEY_ENCRYPTION }}|g" \
                -e "s|{{JAIL_IP_DATABASE}}|${{ secrets.JAIL_IP_DATABASE }}|g" \
                -e "s|{{JAIL_IP_SEMAPHORE}}|${{ secrets.JAIL_IP_SEMAPHORE }}|g" \
                -e "s|{{JAIL_NETWORK_CIDR}}|${{ secrets.JAIL_NETWORK_CIDR }}|g" \
                -e "s|{{JAIL_GATEWAY}}|${{ secrets.JAIL_GATEWAY }}|g" \
                -e "s|{{JAIL_INTERFACE}}|${{ secrets.JAIL_INTERFACE }}|g" \
                "$app_dir/group_vars/all/secrets.yml.template" > "$app_dir/group_vars/all/secrets.yml"
            chmod 600 "$app_dir/group_vars/all/secrets.yml"
          done

      - name: "Phase 1: Verify secrets.yml was created"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            if [ ! -f "$app_dir/group_vars/all/secrets.yml" ]; then
              echo "secrets.yml was not created for $app_dir"
              exit 1
            fi
            echo "secrets.yml created successfully for $app_dir"
          done

      # =========================================================================
      # PRE-CLEAN: Remove leftover infrastructure from previous failed runs
      # =========================================================================
      - name: "Pre-clean: Destroy any leftover jails from previous runs"
        run: |
          first_app_dir=$(echo '${{ env.APPS_JSON }}' | jq -r '.[0].working_dir')
          cd "$first_app_dir"
          echo "Checking for leftover jails..."
          JAILS=$(ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "jls -j semaphore-app 2>/dev/null || jls -j semaphore-db 2>/dev/null || true" 2>&1)
          if echo "$JAILS" | grep -q "semaphore"; then
            echo "Found leftover jails — cleaning up..."
            ansible-playbook -i inventory/hosts.yml \
              playbooks/destroy-all.yml \
              -e confirm_destroy_all=destroy-everything || true
          else
            echo "No leftover jails found"
          fi

      # =========================================================================
      # PHASE 2: Pre-flight Validation
      # =========================================================================
      - name: "Phase 2: Syntax check all playbooks"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "=== Syntax checking $app_dir ==="
            cd "$app_dir"

            echo "Checking site.yml..."
            ansible-playbook -i inventory/hosts.yml site.yml --syntax-check

            for playbook in playbooks/*.yml; do
              if [[ "$playbook" == *"disaster-recovery.yml"* ]]; then
                echo "Skipping $playbook (imports with runtime variables)"
                continue
              fi
              echo "Checking $playbook..."
              ansible-playbook -i inventory/hosts.yml "$playbook" --syntax-check
            done
            echo "All playbooks passed syntax check for $app_dir"
            cd ..
          done

      - name: "Phase 2: Test connectivity to BSD host"
        run: |
          first_app_dir=$(echo '${{ env.APPS_JSON }}' | jq -r '.[0].working_dir')
          cd "$first_app_dir"
          ansible -i inventory/hosts.yml -m ping jail_hosts

      # =========================================================================
      # PHASE 3: Full Deployment (Alias / LAN IP mode)
      # =========================================================================
      - name: "Phase 3: Deploy all applications (alias mode)"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "=== Deploying $app_dir (alias network mode) ==="
            cd "$app_dir"
            # Ensure alias mode is set (default from template)
            grep -q 'jail_network_mode: "alias"' group_vars/all/secrets.yml \
              && echo "Network mode: alias" \
              || echo "WARNING: network mode may not be alias"
            make deploy
            cd ..
          done

      # =========================================================================
      # PHASE 4: Deployment Verification
      # =========================================================================
      - name: "Phase 4: Run verification playbook"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "=== Running make verify for $app_dir ==="
            cd "$app_dir"
            make verify
            cd ..
          done

      - name: "Phase 4: Verify jails are running"
        run: |
          first_app_dir=$(echo '${{ env.APPS_JSON }}' | jq -r '.[0].working_dir')
          cd "$first_app_dir"
          echo "Listing all running jails..."
          ansible -b -i inventory/hosts.yml jail_hosts -m shell -a "jls -v"

      - name: "Phase 4: Health check — services, ports, HTTPS, TLS, database"
        run: |
          echo '${{ env.APPS_JSON }}' | jq -c '.[]' | while IFS= read -r app; do
            app_name=$(echo "$app" | jq -r '.name')
            app_dir=$(echo "$app" | jq -r '.working_dir')
            jail_name=$(echo "$app" | jq -r '.jail_name')
            db_jail_name=$(echo "$app" | jq -r '.db_jail_name')
            port=$(echo "$app" | jq -r '.port')
            health_endpoint=$(echo "$app" | jq -r '.health_endpoint')
            service_name=$(echo "$app" | jq -r '.service_name')

            echo "================================================="
            echo "Health checking: $app_name"
            echo "================================================="

            cd "$app_dir"

            echo ""
            echo "[1/7] Checking $app_name service status..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "jexec $jail_name service $service_name status"

            echo ""
            echo "[2/7] Checking if port $port is listening..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "jexec $jail_name sockstat -l | grep $port"

            echo ""
            echo "[3/7] Testing HTTPS health endpoint..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "jexec $jail_name curl -k -sf https://localhost:$port$health_endpoint"

            echo ""
            echo "[4/7] Validating TLS certificate..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "jexec $jail_name openssl x509 -in /usr/local/etc/ssl/semaphore.crt -noout -dates -subject -issuer"

            echo ""
            echo "[5/7] Verifying TLS certificate matches private key..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "jexec $jail_name sh -c 'CERT_MD5=\$(openssl x509 -noout -modulus -in /usr/local/etc/ssl/semaphore.crt | md5) && KEY_MD5=\$(openssl rsa -noout -modulus -in /usr/local/etc/ssl/semaphore.key 2>/dev/null | md5) && if [ \"\$CERT_MD5\" = \"\$KEY_MD5\" ]; then echo \"Certificate and key match\"; else echo \"MISMATCH\"; exit 1; fi'"

            echo ""
            echo "[6/7] Testing database connectivity (cross-jail)..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "jexec $db_jail_name su - postgres -c \"psql -d semaphore -c 'SELECT version();'\""

            echo ""
            echo "[7/7] Testing API auth endpoint rejects invalid credentials..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "jexec $jail_name curl -k -s -o /dev/null -w '%{http_code}' -X POST https://localhost:$port/api/auth/login -H 'Content-Type: application/json' -d '{\"auth\": \"invalid\", \"password\": \"invalid\"}'"

            cd ..
            echo ""
          done

      - name: "Phase 4: Diagnostic — verify admin user exists in database"
        run: |
          echo '${{ env.APPS_JSON }}' | jq -c '.[]' | while IFS= read -r app; do
            app_dir=$(echo "$app" | jq -r '.working_dir')
            db_jail_name=$(echo "$app" | jq -r '.db_jail_name')
            cd "$app_dir"

            echo "Querying admin users in database..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "jexec $db_jail_name su - postgres -c \"psql -d semaphore -t -c \\\"SELECT username, email, admin FROM \\\\\\\"user\\\\\\\";\\\"\"" \
              || echo "Could not query users (table may not exist yet)"
            cd ..
          done

      - name: "Phase 4: Health check — API authentication (valid credentials)"
        continue-on-error: true
        run: |
          echo '${{ env.APPS_JSON }}' | jq -c '.[]' | while IFS= read -r app; do
            app_dir=$(echo "$app" | jq -r '.working_dir')
            cd "$app_dir"

            cat > playbooks/_test_api_auth.yml << 'PLAYBOOK'
          ---
          - name: Test API Authentication
            hosts: jail_hosts
            become: true
            gather_facts: false
            vars_files:
              - ../group_vars/all/vars.yml
              - ../group_vars/all/secrets.yml
            tasks:
              - name: Write auth payload to file (avoids shell quoting issues)
                copy:
                  content: '{"auth": "{{ semaphore_admin_user }}", "password": "{{ semaphore_admin_password }}"}'
                  dest: "/{{ zfs_pool }}/{{ jail_dataset }}/data/semaphore-app/tmp/auth_payload.json"
                  mode: "0600"

              - name: Login with admin credentials (via jexec + file payload)
                shell: |
                  jexec semaphore-app curl -k -s -w '\nHTTP_STATUS:%{http_code}' -X POST \
                    https://localhost:{{ semaphore_port }}/api/auth/login \
                    -H 'Content-Type: application/json' \
                    -d @/tmp/auth_payload.json
                register: login_result
                changed_when: false

              - name: Clean up auth payload
                file:
                  path: "/{{ zfs_pool }}/{{ jail_dataset }}/data/semaphore-app/tmp/auth_payload.json"
                  state: absent

              - name: Display login response
                debug:
                  msg: "{{ login_result.stdout | default('no output') }}"

              - name: Verify auth token received
                assert:
                  that:
                    - "'token' in login_result.stdout"
                  success_msg: "API authentication successful — token received"
                  fail_msg: "API authentication failed — response: {{ login_result.stdout | default('empty') }}"
          PLAYBOOK

            ansible-playbook -i inventory/hosts.yml playbooks/_test_api_auth.yml
            rm -f playbooks/_test_api_auth.yml
            cd ..
          done

      # =========================================================================
      # PHASE 5: Idempotency Test
      # =========================================================================
      - name: "Phase 5: Idempotency — redeploy all applications"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "=== Idempotency test: redeploying $app_dir ==="
            cd "$app_dir"
            make deploy
            cd ..
          done

      - name: "Phase 5: Idempotency — verify after redeploy"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            cd "$app_dir"
            make verify
            cd ..
          done

      # =========================================================================
      # PHASE 6: Version Update Test
      # =========================================================================
      - name: "Phase 6: Update Semaphore version"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            cd "$app_dir"

            UPDATE_VERSION="${{ inputs.update_version }}"
            if [ -z "$UPDATE_VERSION" ]; then
              UPDATE_VERSION=$(grep 'semaphore_version:' group_vars/all/vars.yml | awk -F'"' '{print $2}')
              echo "No version specified — redeploying current version: $UPDATE_VERSION"
            fi

            echo "=== Updating Semaphore to $UPDATE_VERSION ==="
            ansible-playbook -i inventory/hosts.yml \
              playbooks/update-semaphore.yml \
              -e "semaphore_new_version=$UPDATE_VERSION"
            cd ..
          done

      - name: "Phase 6: Verify after version update"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            cd "$app_dir"
            make verify
            cd ..
          done

      # =========================================================================
      # PHASE 7: Backup & Restore Cycle
      # =========================================================================
      - name: "Phase 7: Create ZFS snapshots"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "=== Creating ZFS snapshot for $app_dir ==="
            cd "$app_dir"
            make snapshot
            cd ..
          done

      - name: "Phase 7: Create first backup"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "=== Creating first backup for $app_dir ==="
            cd "$app_dir"
            make backup
            cd ..
          done

      - name: "Phase 7: Wait between backups (unique timestamps)"
        run: sleep 2

      - name: "Phase 7: Create second backup"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "=== Creating second backup for $app_dir ==="
            cd "$app_dir"
            make backup
            cd ..
          done

      - name: "Phase 7: List and verify backups"
        run: |
          echo '${{ env.APPS_JSON }}' | jq -c '.[]' | while IFS= read -r app; do
            app_name=$(echo "$app" | jq -r '.name')
            app_dir=$(echo "$app" | jq -r '.working_dir')
            backup_location=$(echo "$app" | jq -r '.backup_location')

            echo "=== Backups for $app_name ==="
            cd "$app_dir"

            echo "Listing backups..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "ls -lhd $backup_location/20*/" || true

            BACKUP_COUNT=$(ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "ls -1d $backup_location/20* 2>/dev/null | wc -l | tr -d ' '" \
              2>&1 | grep -oE '[0-9]+' | tail -1)

            echo "Found $BACKUP_COUNT backup(s)"
            if [ "$BACKUP_COUNT" -lt 2 ]; then
              echo "Expected at least 2 backups, found $BACKUP_COUNT"
              exit 1
            fi
            echo "Multiple backups verified ($BACKUP_COUNT)"
            cd ..
          done

      - name: "Phase 7: Restore from most recent backup"
        run: |
          echo '${{ env.APPS_JSON }}' | jq -c '.[]' | while IFS= read -r app; do
            app_name=$(echo "$app" | jq -r '.name')
            app_dir=$(echo "$app" | jq -r '.working_dir')
            backup_location=$(echo "$app" | jq -r '.backup_location')

            echo "=== Restoring $app_name ==="
            cd "$app_dir"

            BACKUP_TS=$(ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "ls -1d $backup_location/2* | tail -1 | xargs basename" \
              | grep -oE '[0-9]{8}T[0-9]{6}' | head -1)

            if [ -z "$BACKUP_TS" ]; then
              echo "Could not determine backup timestamp"
              exit 1
            fi

            echo "Restoring from backup: $BACKUP_TS"
            ansible-playbook -i inventory/hosts.yml playbooks/restore.yml \
              -e backup_timestamp=$BACKUP_TS \
              -e confirm_restore=yes
            cd ..
          done

      - name: "Phase 7: Verify after restore"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "=== Post-restore verification for $app_dir ==="
            cd "$app_dir"
            make verify
            cd ..
          done

      - name: "Phase 7: Post-restore API authentication check"
        continue-on-error: true
        run: |
          echo '${{ env.APPS_JSON }}' | jq -c '.[]' | while IFS= read -r app; do
            app_dir=$(echo "$app" | jq -r '.working_dir')
            cd "$app_dir"

            cat > playbooks/_test_api_auth.yml << 'PLAYBOOK'
          ---
          - name: Post-restore API Authentication Test
            hosts: jail_hosts
            become: true
            gather_facts: false
            vars_files:
              - ../group_vars/all/vars.yml
              - ../group_vars/all/secrets.yml
            tasks:
              - name: Write auth payload
                copy:
                  content: '{"auth": "{{ semaphore_admin_user }}", "password": "{{ semaphore_admin_password }}"}'
                  dest: "/{{ zfs_pool }}/{{ jail_dataset }}/data/semaphore-app/tmp/auth_payload.json"
                  mode: "0600"

              - name: Login after restore (via jexec)
                shell: |
                  jexec semaphore-app curl -k -s -w '\nHTTP_STATUS:%{http_code}' -X POST \
                    https://localhost:{{ semaphore_port }}/api/auth/login \
                    -H 'Content-Type: application/json' \
                    -d @/tmp/auth_payload.json
                register: login_result
                changed_when: false

              - name: Clean up auth payload
                file:
                  path: "/{{ zfs_pool }}/{{ jail_dataset }}/data/semaphore-app/tmp/auth_payload.json"
                  state: absent

              - name: Display response
                debug:
                  msg: "{{ login_result.stdout | default('no output') }}"

              - name: Verify auth works after restore
                assert:
                  that:
                    - "'token' in login_result.stdout"
                  success_msg: "Post-restore API authentication successful"
                  fail_msg: "Post-restore API authentication failed"
          PLAYBOOK

            ansible-playbook -i inventory/hosts.yml playbooks/_test_api_auth.yml
            rm -f playbooks/_test_api_auth.yml
            cd ..
          done

      # =========================================================================
      # PHASE 8: Destroy & Disaster Recovery (Alias mode)
      # =========================================================================
      - name: "Phase 8: Graceful destroy"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "=== Graceful destroy for $app_dir ==="
            cd "$app_dir"
            ansible-playbook -i inventory/hosts.yml \
              playbooks/destroy.yml \
              -e confirm_destroy=yes
            cd ..
          done

      - name: "Phase 8: Verify jails are stopped"
        run: |
          first_app_dir=$(echo '${{ env.APPS_JSON }}' | jq -r '.[0].working_dir')
          cd "$first_app_dir"
          echo "Checking jail status after graceful destroy..."

          JAIL_OUTPUT=$(ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "jls -j semaphore-app 2>&1 || true" 2>&1)
          if echo "$JAIL_OUTPUT" | grep -q "semaphore-app"; then
            echo "WARNING: semaphore-app jail still running after destroy"
          else
            echo "semaphore-app jail stopped (expected)"
          fi

          JAIL_OUTPUT=$(ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "jls -j semaphore-db 2>&1 || true" 2>&1)
          if echo "$JAIL_OUTPUT" | grep -q "semaphore-db"; then
            echo "WARNING: semaphore-db jail still running after destroy"
          else
            echo "semaphore-db jail stopped (expected)"
          fi

      - name: "Phase 8: Verify configuration removed"
        run: |
          first_app_dir=$(echo '${{ env.APPS_JSON }}' | jq -r '.[0].working_dir')
          cd "$first_app_dir"
          echo "Verifying jail configs removed..."
          ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "ls -la /usr/local/etc/jail.conf.d/semaphore-*.conf 2>/dev/null || echo 'No jail configs found (expected)'"

      - name: "Phase 8: Verify backups survived destroy"
        run: |
          echo '${{ env.APPS_JSON }}' | jq -c '.[]' | while IFS= read -r app; do
            app_dir=$(echo "$app" | jq -r '.working_dir')
            backup_location=$(echo "$app" | jq -r '.backup_location')
            cd "$app_dir"

            BACKUP_COUNT=$(ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "ls -1d $backup_location/20* 2>/dev/null | wc -l | tr -d ' '" \
              2>&1 | grep -oE '[0-9]+' | tail -1)

            if [ "$BACKUP_COUNT" -lt 1 ]; then
              echo "Backups lost after destroy — DR impossible"
              exit 1
            fi
            echo "Backups survived destroy ($BACKUP_COUNT found)"
            cd ..
          done

      - name: "Phase 8: DR — rebuild infrastructure from scratch"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "=== DR Phase 1: Redeploying $app_dir ==="
            cd "$app_dir"
            make deploy
            cd ..
          done

      - name: "Phase 8: DR — restore data from backup"
        run: |
          echo '${{ env.APPS_JSON }}' | jq -c '.[]' | while IFS= read -r app; do
            app_name=$(echo "$app" | jq -r '.name')
            app_dir=$(echo "$app" | jq -r '.working_dir')
            backup_location=$(echo "$app" | jq -r '.backup_location')

            echo "=== DR Phase 2: Restoring data for $app_name ==="
            cd "$app_dir"

            BACKUP_TS=$(ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "ls -1d $backup_location/2* | tail -1 | xargs basename" \
              | grep -oE '[0-9]{8}T[0-9]{6}' | head -1)

            if [ -z "$BACKUP_TS" ]; then
              echo "Could not determine backup timestamp for DR restore"
              exit 1
            fi

            echo "Restoring from backup: $BACKUP_TS"
            ansible-playbook -i inventory/hosts.yml playbooks/restore.yml \
              -e backup_timestamp=$BACKUP_TS \
              -e confirm_restore=yes
            cd ..
          done

      - name: "Phase 8: DR — verify after disaster recovery"
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "=== Post-DR verification for $app_dir ==="
            cd "$app_dir"
            make verify
            cd ..
          done

      - name: "Phase 8: DR — post-recovery API authentication"
        continue-on-error: true
        run: |
          echo '${{ env.APPS_JSON }}' | jq -c '.[]' | while IFS= read -r app; do
            app_dir=$(echo "$app" | jq -r '.working_dir')
            cd "$app_dir"

            cat > playbooks/_test_api_auth.yml << 'PLAYBOOK'
          ---
          - name: Post-DR API Authentication Test
            hosts: jail_hosts
            become: true
            gather_facts: false
            vars_files:
              - ../group_vars/all/vars.yml
              - ../group_vars/all/secrets.yml
            tasks:
              - name: Write auth payload
                copy:
                  content: '{"auth": "{{ semaphore_admin_user }}", "password": "{{ semaphore_admin_password }}"}'
                  dest: "/{{ zfs_pool }}/{{ jail_dataset }}/data/semaphore-app/tmp/auth_payload.json"
                  mode: "0600"

              - name: Login after DR (via jexec)
                shell: |
                  jexec semaphore-app curl -k -s -w '\nHTTP_STATUS:%{http_code}' -X POST \
                    https://localhost:{{ semaphore_port }}/api/auth/login \
                    -H 'Content-Type: application/json' \
                    -d @/tmp/auth_payload.json
                register: login_result
                changed_when: false

              - name: Clean up auth payload
                file:
                  path: "/{{ zfs_pool }}/{{ jail_dataset }}/data/semaphore-app/tmp/auth_payload.json"
                  state: absent

              - name: Display response
                debug:
                  msg: "{{ login_result.stdout | default('no output') }}"

              - name: Verify auth works after DR
                assert:
                  that:
                    - "'token' in login_result.stdout"
                  success_msg: "Post-DR API authentication successful"
                  fail_msg: "Post-DR API authentication failed"
          PLAYBOOK

            ansible-playbook -i inventory/hosts.yml playbooks/_test_api_auth.yml
            rm -f playbooks/_test_api_auth.yml
            cd ..
          done

      # =========================================================================
      # PHASE 9: Alias Mode Cleanup
      # =========================================================================
      - name: "Phase 9: Destroy all (alias mode cleanup)"
        run: |
          first_app_dir=$(echo '${{ env.APPS_JSON }}' | jq -r '.[0].working_dir')
          echo "Cleaning up alias mode deployment..."
          cd "$first_app_dir"
          ansible-playbook -i inventory/hosts.yml \
            playbooks/destroy-all.yml \
            -e confirm_destroy_all=destroy-everything

      - name: "Phase 9: Verify alias mode cleanup"
        run: |
          first_app_dir=$(echo '${{ env.APPS_JSON }}' | jq -r '.[0].working_dir')
          cd "$first_app_dir"

          echo "Verifying jails are destroyed..."
          ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "jls || echo 'No jails found (expected)'"

          echo ""
          echo "Verifying rc.conf.d cleanup..."
          ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "grep -E 'jail_.*_enable' /etc/rc.conf.d/jail-forge 2>/dev/null || echo 'No jail entries found (expected)'"

      # =========================================================================
      # PHASE 10: NAT Mode Deployment (individual playbooks)
      # =========================================================================
      - name: "Phase 10: Switch to NAT networking mode"
        if: ${{ inputs.test_nat_mode }}
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "Switching $app_dir to NAT network mode..."
            # Replace alias with nat in secrets.yml
            sed 's/jail_network_mode: "alias"/jail_network_mode: "nat"/' \
              "$app_dir/group_vars/all/secrets.yml" > /tmp/secrets_nat.yml
            mv /tmp/secrets_nat.yml "$app_dir/group_vars/all/secrets.yml"
            chmod 600 "$app_dir/group_vars/all/secrets.yml"
            # Verify the change
            grep 'jail_network_mode' "$app_dir/group_vars/all/secrets.yml"
          done

      - name: "Phase 10: Deploy with individual playbooks (NAT mode)"
        if: ${{ inputs.test_nat_mode }}
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "=== Deploying $app_dir with NAT mode (individual playbooks) ==="
            cd "$app_dir"

            echo ""
            echo "--- Step 1/4: Prepare host (make init) ---"
            make init

            echo ""
            echo "--- Step 2/4: Deploy database (make deploy-db) ---"
            make deploy-db

            echo ""
            echo "--- Step 3/4: Deploy application (make deploy-app) ---"
            make deploy-app

            echo ""
            echo "--- Step 4/4: Verify deployment (make verify) ---"
            make verify

            cd ..
          done

      # =========================================================================
      # PHASE 11: NAT Mode Verification
      # =========================================================================
      - name: "Phase 11: NAT — verify pf firewall and NAT rules"
        if: ${{ inputs.test_nat_mode }}
        run: |
          first_app_dir=$(echo '${{ env.APPS_JSON }}' | jq -r '.[0].working_dir')
          cd "$first_app_dir"

          echo "=== NAT-specific infrastructure checks ==="

          echo ""
          echo "[1/5] Checking pf is enabled and running..."
          ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "pfctl -si | head -5"

          echo ""
          echo "[2/5] Checking NAT/redirect rules..."
          ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "pfctl -sn 2>/dev/null || echo 'No NAT rules (check pf config)'"

          echo ""
          echo "[3/5] Checking pf filter rules for jails..."
          ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "pfctl -sr 2>/dev/null | head -20 || echo 'No filter rules'"

          echo ""
          echo "[4/5] Checking loopback interface with jail IPs..."
          ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "ifconfig lo1 2>/dev/null || echo 'lo1 interface not found'"

          echo ""
          echo "[5/5] Checking IP forwarding is enabled..."
          ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "sysctl net.inet.ip.forwarding"

      - name: "Phase 11: NAT — health check services and connectivity"
        if: ${{ inputs.test_nat_mode }}
        run: |
          echo '${{ env.APPS_JSON }}' | jq -c '.[]' | while IFS= read -r app; do
            app_name=$(echo "$app" | jq -r '.name')
            app_dir=$(echo "$app" | jq -r '.working_dir')
            jail_name=$(echo "$app" | jq -r '.jail_name')
            db_jail_name=$(echo "$app" | jq -r '.db_jail_name')
            port=$(echo "$app" | jq -r '.port')
            health_endpoint=$(echo "$app" | jq -r '.health_endpoint')
            service_name=$(echo "$app" | jq -r '.service_name')

            echo "================================================="
            echo "NAT mode health check: $app_name"
            echo "================================================="
            cd "$app_dir"

            echo "[1/5] Service status..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "jexec $jail_name service $service_name status"

            echo ""
            echo "[2/5] Port $port listening..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "jexec $jail_name sockstat -l | grep $port"

            echo ""
            echo "[3/5] HTTPS health via jail IP (loopback)..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "jexec $jail_name curl -k -sf https://localhost:$port$health_endpoint"

            echo ""
            echo "[4/5] Database connectivity..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "jexec $db_jail_name su - postgres -c \"psql -d semaphore -c 'SELECT 1 as nat_test;'\""

            echo ""
            echo "[5/5] HTTPS via host (NAT forwarding test)..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "curl -k -sf https://${{ secrets.JAIL_IP_SEMAPHORE }}:$port$health_endpoint || echo 'Host-level access check (may require external client)'"

            cd ..
          done

      - name: "Phase 11: NAT — API authentication"
        continue-on-error: true
        if: ${{ inputs.test_nat_mode }}
        run: |
          echo '${{ env.APPS_JSON }}' | jq -c '.[]' | while IFS= read -r app; do
            app_dir=$(echo "$app" | jq -r '.working_dir')
            cd "$app_dir"

            cat > playbooks/_test_api_auth.yml << 'PLAYBOOK'
          ---
          - name: NAT Mode API Authentication Test
            hosts: jail_hosts
            become: true
            gather_facts: false
            vars_files:
              - ../group_vars/all/vars.yml
              - ../group_vars/all/secrets.yml
            tasks:
              - name: Write auth payload
                copy:
                  content: '{"auth": "{{ semaphore_admin_user }}", "password": "{{ semaphore_admin_password }}"}'
                  dest: "/{{ zfs_pool }}/{{ jail_dataset }}/data/semaphore-app/tmp/auth_payload.json"
                  mode: "0600"

              - name: Login in NAT mode (via jexec)
                shell: |
                  jexec semaphore-app curl -k -s -w '\nHTTP_STATUS:%{http_code}' -X POST \
                    https://localhost:{{ semaphore_port }}/api/auth/login \
                    -H 'Content-Type: application/json' \
                    -d @/tmp/auth_payload.json
                register: login_result
                changed_when: false

              - name: Clean up auth payload
                file:
                  path: "/{{ zfs_pool }}/{{ jail_dataset }}/data/semaphore-app/tmp/auth_payload.json"
                  state: absent

              - name: Display response
                debug:
                  msg: "{{ login_result.stdout | default('no output') }}"

              - name: Verify auth works in NAT mode
                assert:
                  that:
                    - "'token' in login_result.stdout"
                  success_msg: "NAT mode API authentication successful"
                  fail_msg: "NAT mode API authentication failed"
          PLAYBOOK

            ansible-playbook -i inventory/hosts.yml playbooks/_test_api_auth.yml
            rm -f playbooks/_test_api_auth.yml
            cd ..
          done

      - name: "Phase 11: NAT — backup with compression"
        if: ${{ inputs.test_nat_mode }}
        run: |
          for app_dir in $(echo '${{ env.APPS_JSON }}' | jq -r '.[].working_dir'); do
            echo "=== Creating compressed backup in NAT mode for $app_dir ==="
            cd "$app_dir"
            ansible-playbook -i inventory/hosts.yml playbooks/backup.yml \
              -e '{"backup_compress": true}'
            cd ..
          done

      - name: "Phase 11: NAT — verify compressed backup exists"
        if: ${{ inputs.test_nat_mode }}
        run: |
          echo '${{ env.APPS_JSON }}' | jq -c '.[]' | while IFS= read -r app; do
            app_dir=$(echo "$app" | jq -r '.working_dir')
            backup_location=$(echo "$app" | jq -r '.backup_location')
            cd "$app_dir"

            echo "Checking for compressed backup archive..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "ls -lh $backup_location/semaphore-backup-*.tar.gz 2>/dev/null || echo 'No compressed archive found'"

            echo ""
            echo "Listing all backups..."
            ansible -b -i inventory/hosts.yml jail_hosts -m shell \
              -a "ls -lhd $backup_location/20*/ 2>/dev/null; ls -lh $backup_location/*.tar.gz 2>/dev/null" || true
            cd ..
          done

      # =========================================================================
      # PHASE 12: NAT Mode Cleanup
      # =========================================================================
      - name: "Phase 12: NAT mode — destroy all"
        if: ${{ inputs.test_nat_mode && !inputs.skip_destroy }}
        run: |
          first_app_dir=$(echo '${{ env.APPS_JSON }}' | jq -r '.[0].working_dir')
          echo "Cleaning up NAT mode deployment..."
          cd "$first_app_dir"
          ansible-playbook -i inventory/hosts.yml \
            playbooks/destroy-all.yml \
            -e confirm_destroy_all=destroy-everything

      - name: "Phase 12: NAT mode — verify cleanup (jails, pf, loopback, forwarding)"
        if: ${{ inputs.test_nat_mode && !inputs.skip_destroy }}
        run: |
          first_app_dir=$(echo '${{ env.APPS_JSON }}' | jq -r '.[0].working_dir')
          cd "$first_app_dir"

          echo "Verifying jails are destroyed..."
          ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "jls || echo 'No jails found (expected)'"

          echo ""
          echo "Verifying rc.conf.d cleanup..."
          ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "grep -E 'jail_.*_enable' /etc/rc.conf.d/jail-forge 2>/dev/null || echo 'No jail entries (expected)'"

          echo ""
          echo "Verifying loopback interface removed..."
          ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "ifconfig lo1 2>/dev/null && echo 'WARNING: lo1 still exists' || echo 'lo1 removed (expected)'"

          echo ""
          echo "Verifying IP forwarding disabled..."
          ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "sysctl -n net.inet.ip.forwarding | grep -q 0 && echo 'IP forwarding disabled (expected)' || echo 'WARNING: IP forwarding still enabled'"

          echo ""
          echo "Verifying ZFS jail data datasets removed..."
          ansible -b -i inventory/hosts.yml jail_hosts -m shell \
            -a "zfs list -H -o name 2>/dev/null | grep 'jails/data/' || echo 'No jail data datasets (expected)'"

      # =========================================================================
      # SKIP-DESTROY: Final cleanup for alias-only runs without NAT
      # =========================================================================
      - name: "Final: Destroy all (no NAT test)"
        if: ${{ !inputs.test_nat_mode && !inputs.skip_destroy }}
        run: |
          first_app_dir=$(echo '${{ env.APPS_JSON }}' | jq -r '.[0].working_dir')
          cd "$first_app_dir"
          # Phase 9 already handled cleanup if NAT test is enabled
          # This handles the case where NAT test is disabled
          echo "No NAT test — Phase 9 cleanup already completed"

      # =========================================================================
      # TEST SUMMARY
      # =========================================================================
      - name: Test summary
        if: always()
        run: |
          num_apps=$(echo '${{ env.APPS_JSON }}' | jq '. | length')
          app_names=$(echo '${{ env.APPS_JSON }}' | jq -r '.[].name' | paste -sd ',' -)

          echo "================================================================"
          echo "  Full Lifecycle Test Complete"
          echo "================================================================"
          echo ""
          echo "Applications tested: $num_apps ($app_names)"
          echo ""
          echo "Phase 1 — Environment Setup:"
          echo "    System dependencies verified"
          echo "    Ansible installed"
          echo "    SSH configured"
          echo "    Inventory and secrets created"
          echo ""
          echo "Phase 2 — Pre-flight Validation:"
          echo "    Syntax check (site.yml + all playbooks)"
          echo "    Host connectivity (ansible ping)"
          echo ""
          echo "Phase 3 — Full Deployment (alias / LAN IP mode):"
          echo "    site.yml (all 4 sub-playbooks)"
          echo ""
          echo "Phase 4 — Deployment Verification:"
          echo "    Verification playbook (04-verify-deployment.yml)"
          echo "    Service status check"
          echo "    Port listening check"
          echo "    HTTPS health endpoint"
          echo "    TLS certificate validation"
          echo "    TLS cert/key match verification"
          echo "    Database cross-jail connectivity"
          echo "    API auth endpoint (rejects invalid creds)"
          echo "    API auth login (valid creds, token received)"
          echo ""
          echo "Phase 5 — Idempotency:"
          echo "    Second deploy completes without failures"
          echo "    Post-redeploy verification"
          echo ""
          echo "Phase 6 — Version Update:"
          echo "    update-semaphore.yml playbook"
          echo "    Post-update verification"
          echo ""
          echo "Phase 7 — Backup & Restore:"
          echo "    ZFS snapshot creation"
          echo "    First backup created"
          echo "    Second backup created"
          echo "    Backup count verification (>= 2)"
          echo "    Restore from most recent backup"
          echo "    Post-restore verification"
          echo "    Post-restore API authentication"
          echo ""
          echo "Phase 8 — Disaster Recovery:"
          echo "    Graceful destroy (destroy.yml)"
          echo "    Jail stop verification"
          echo "    Configuration removal verification"
          echo "    Backup survival verification"
          echo "    Infrastructure rebuild (full deploy)"
          echo "    Data restoration from backup"
          echo "    Post-DR verification"
          echo "    Post-DR API authentication"
          echo ""
          echo "Phase 9 — Alias Mode Cleanup:"
          echo "    Complete destruction (destroy-all.yml)"
          echo "    Jail removal verified"
          echo "    rc.conf.d cleanup verified"
          echo ""
          if [ "${{ inputs.test_nat_mode }}" = "true" ]; then
            echo "Phase 10 — NAT Mode Deployment:"
            echo "    Switched to NAT networking mode"
            echo "    Individual playbook deployment:"
            echo "      make init (01-prepare-host.yml)"
            echo "      make deploy-db (02-deploy-database.yml)"
            echo "      make deploy-app (03-deploy-semaphore.yml)"
            echo "      make verify (04-verify-deployment.yml)"
            echo ""
            echo "Phase 11 — NAT Mode Verification:"
            echo "    pf firewall status"
            echo "    NAT/redirect rules"
            echo "    pf filter rules"
            echo "    Loopback interface (lo1) with jail IPs"
            echo "    IP forwarding enabled"
            echo "    Service status"
            echo "    Port listening"
            echo "    HTTPS health endpoint"
            echo "    Database connectivity"
            echo "    Host-level NAT access"
            echo "    API authentication"
            echo "    Compressed backup creation"
            echo "    Compressed backup verification"
            echo ""
            if [ "${{ inputs.skip_destroy }}" = "true" ]; then
              echo "Phase 12 — NAT Cleanup:"
              echo "    Skipped (user requested)"
            else
              echo "Phase 12 — NAT Cleanup:"
              echo "    Complete destruction (destroy-all.yml)"
              echo "    Jail removal verified"
              echo "    rc.conf.d cleanup verified"
              echo "    Loopback interface removal verified"
              echo "    IP forwarding disabled verified"
              echo "    ZFS dataset removal verified"
            fi
          else
            echo "Phase 10-12 — NAT Mode: Skipped"
          fi
          echo ""
          echo "================================================================"
